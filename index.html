<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi tienda en línea</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet">
  <script>
    tailwind.config = { corePlugins: { preflight: false } }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

  <header class="flex items-center justify-between px-6 py-3 bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="flex items-center">
      <img src="https://picsum.photos/50" alt="Logo" class="rounded-full w-10 h-10">
    </div>
    <div class="flex-1 mx-8 max-w-md">
      <input
        id="search-input"
        type="text"
        placeholder="Buscar productos..."
        class="w-full px-4 py-2 text-sm border border-gray-300 rounded-full outline-none focus:border-green-700"
      >
    </div>
    <div class="flex items-center gap-6">
      <a href="#/" class="text-sm font-semibold text-gray-800 hover:text-green-700">Productos</a>
      <a href="#/cart" class="relative">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:24px;height:24px;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-9H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        <span id="cart-count" class="absolute -top-2 -right-2 bg-green-700 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center">0</span>
      </a>
    </div>
  </header>

  <section id="app"></section>

  <footer>
    <p>Hecho con ❤️ por los alumnos de Ingeniería de requisitos</p>
  </footer>

  <script src="js/main.js" type="module"></script>

</body>

</html>
